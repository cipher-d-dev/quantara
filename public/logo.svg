<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="40" height="40" rx="10" fill="url(#logo-bg)"/>
  <circle cx="20" cy="20" r="11" stroke="url(#logo-ring)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="56 14" fill="none"/>
  <circle cx="20" cy="20" r="3" fill="url(#logo-nucleus)"/>
  <line x1="28" y1="28" x2="32" y2="32" stroke="url(#logo-ring)" stroke-width="2.5" stroke-linecap="round"/>
  <defs>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="logo-ring" x1="9" y1="9" x2="31" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <radialGradient id="logo-nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </radialGradient>
